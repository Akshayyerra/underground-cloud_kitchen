<!DOCTYPE html>
<html>

<head>

<title>Kitchen Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
width:180px;
}

.logout-btn{
padding:8px 15px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.sales{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
text-align:center;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.column{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
min-height:300px;
}

.column h2{
text-align:center;
background:#ffc107;
padding:8px;
border-radius:5px;
}

.order{
background:#fff3cd;
margin:10px 0;
padding:10px;
border-radius:8px;
}

button{
margin-top:5px;
padding:6px 10px;
border:none;
background:black;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<button class="logout-btn" onclick="logout()">Logout</button>

</div>

<div class="sales">

<h2>Daily Sales Dashboard</h2>

<p>Total Orders: <span id="totalOrders">0</span></p>
<p>Total Revenue: ₹<span id="totalRevenue">0</span></p>

</div>

<div class="container">

<div class="column">
<h2>Live Orders</h2>
<div id="liveOrders"></div>
</div>

<div class="column">
<h2>Preparing</h2>
<div id="preparingOrders"></div>
</div>

<div class="column">
<h2>On The Way</h2>
<div id="onwayOrders"></div>
</div>

<div class="column">
<h2>Delivered</h2>
<div id="deliveredOrders"></div>
</div>

</div>

<audio id="alertSound" src="sounds/alert.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>

<script>

let socket = io()

let totalOrders = 0
let totalRevenue = 0

socket.on("newOrder",(order)=>{

document.getElementById("alertSound").play()

updateSales(order.total)

addLiveOrder(order)

})

function updateSales(total){

totalOrders++
totalRevenue += total

document.getElementById("totalOrders").innerText = totalOrders
document.getElementById("totalRevenue").innerText = totalRevenue

}

function addLiveOrder(order){

let div = createOrderCard(order)

let btn = document.createElement("button")
btn.innerText = "Start Preparing"

btn.onclick = () => {

document.getElementById("preparingOrders").appendChild(div)

btn.remove()

addPreparingButton(div)

}

div.appendChild(btn)

document.getElementById("liveOrders").prepend(div)

}

function addPreparingButton(div){

let btn = document.createElement("button")

btn.innerText = "On The Way"

btn.onclick = () => {

document.getElementById("onwayOrders").appendChild(div)

btn.remove()

addDeliveredButton(div)

}

div.appendChild(btn)

}

function addDeliveredButton(div){

let btn = document.createElement("button")

btn.innerText = "Delivered"

btn.onclick = () => {

document.getElementById("deliveredOrders").appendChild(div)

btn.remove()

}

div.appendChild(btn)

}

function createOrderCard(order){

let div = document.createElement("div")

div.className = "order"

let items = ""

order.items.forEach(item=>{
items += item.name + " ₹" + item.price + "<br>"
})

div.innerHTML = `
<b>Order ID:</b> ${order.id}<br>
<b>Name:</b> ${order.name}<br>
<b>Phone:</b> ${order.phone}<br>
<b>Items:</b><br>${items}
<b>Total:</b> ₹${order.total}<br>
`

return div

}

function logout(){

window.location="login.html"

}

</script>

</body>
</html>
